<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM GAME LEGEND</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
}

h1{
color:#38bdf8;
}

button{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
background:#38bdf8;
color:white;
font-size:15px;
}

#tablero{
display:grid;
grid-template-columns:repeat(5,70px);
gap:8px;
justify-content:center;
margin-top:20px;
}

.casilla{
width:70px;
height:70px;
background:#1e293b;
border-radius:14px;
position:relative;
}

.meta{
background:#22c55e;
}

.renzo{
width:22px;
height:22px;
background:#22c55e;
border-radius:50%;
position:absolute;
top:24px;
left:8px;
}

.anita{
width:22px;
height:22px;
background:#f43f5e;
border-radius:50%;
position:absolute;
top:24px;
right:8px;
}

.tarea{
background:#1e293b;
padding:10px;
margin:10px;
border-radius:10px;
}

.completada{
opacity:0.4;
}

</style>

</head>

<body>

<h1>🎮 ENAM GAME</h1>

<h3 id="jugador"></h3>

<h2>⏳ Tiempo restante</h2>
<h2 id="timer"></h2>

<button onclick="pantallaTablero()">🎮 Tablero</button>
<button onclick="pantallaTareas()">📚 Tareas</button>
<button onclick="pantallaRanking()">🏆 Ranking</button>
<button onclick="pantallaAdmin()">⚙️ Admin</button>

<div id="contenido"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let jugador=localStorage.getItem("jugador")

if(!jugador){
jugador=prompt("Escribe tu nombre: Renzo o Anita")
localStorage.setItem("jugador",jugador)
}

document.getElementById("jugador").innerText="Jugador: "+jugador

const tareas=[

"Curso 1 qx: Resumen base",
"Curso 1 qx: Eva",
"Curso 1 qx: Estudia conmigo",
"Curso 2 Usa: Org mental",
"Curso 2 Usa: Resumen base",
"Curso 2 Usa: Banqueo",
"Curso 2 Usa: Casos esenciales"

]

function pantallaTablero(){

fetch(API+"?accion=ranking")
.then(r=>r.json())
.then(data=>{

let renzo=0
let anita=0

data.forEach(j=>{

if(j.nombre=="Renzo") renzo=j.puntos
if(j.nombre=="Anita") anita=j.puntos

})

let html="<div id='tablero'>"

for(let i=0;i<15;i++){

let clase="casilla"

if(i==14) clase="casilla meta"

html+=`<div class="${clase}">`

if(i==renzo) html+=`<div class="renzo"></div>`
if(i==anita) html+=`<div class="anita"></div>`

html+="</div>"

}

html+="</div>"

document.getElementById("contenido").innerHTML=html

if(renzo>=7 || anita>=7){

ganador(renzo>anita?"Renzo":"Anita")

}

})

}

function pantallaTareas(){

let html=""

tareas.forEach(t=>{

html+=`

<div class="tarea">

${t}

<br>

<button onclick="completar('${t}')">

Completar

</button>

</div>

`

})

document.getElementById("contenido").innerHTML=html

}

function completar(t){

fetch(API+"?accion=tarea&jugador="+jugador+"&tarea="+t)

alert("✅ Tarea completada")

pantallaTablero()

}

function pantallaRanking(){

fetch(API+"?accion=ranking")
.then(r=>r.json())
.then(data=>{

let html="<h2>🏆 Ranking</h2>"

data.sort((a,b)=>b.puntos-a.puntos)

data.forEach(j=>{

html+=`<p>${j.nombre} — ${j.puntos} puntos</p>`

})

document.getElementById("contenido").innerHTML=html

})

}

function pantallaAdmin(){

let html=`

<h2>ADMIN</h2>

Deadline:

<br>

<input id="deadline" type="datetime-local">

<br><br>

<button onclick="guardarDeadline()">

Guardar deadline

</button>

<br><br>

<button onclick="reset()">

Reiniciar juego

</button>

`

document.getElementById("contenido").innerHTML=html

}

function guardarDeadline(){

let d=document.getElementById("deadline").value

fetch(API+"?accion=deadline&valor="+d)

alert("⏳ Deadline actualizado")

}

function reset(){

fetch(API+"?accion=reset")

alert("🔄 Juego reiniciado")

}

function iniciarTimer(){

fetch(API+"?accion=deadline")

.then(r=>r.text())

.then(d=>{

let deadline=new Date(d)

setInterval(()=>{

let now=new Date()

let diff=deadline-now

if(diff<0){

document.getElementById("timer").innerText="FIN DEL JUEGO"

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=h+"h "+m+"m "+s+"s"

},1000)

})

}

function ganador(nombre){

document.getElementById("contenido").innerHTML=

`<h1>🏆 GANADOR</h1>

<h2>${nombre}</h2>

<p>

El perdedor debe dar un premio romántico ❤️

</p>

`

}

pantallaTablero()

iniciarTimer()

</script>

</body>

</html>
