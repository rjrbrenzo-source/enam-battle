<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Game 🎮</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
background:#38bdf8;
color:white;
font-size:16px;
}

.tablero{
display:grid;
grid-template-columns:repeat(8,40px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.casilla{
width:40px;
height:40px;
background:#1e293b;
border-radius:8px;
}

.fichaA{
background:#22c55e;
}

.fichaB{
background:#f43f5e;
}

.tarea{
background:#1e293b;
padding:10px;
margin:5px;
border-radius:10px;
}

.bloqueada{
opacity:0.4;
}

</style>
</head>

<body>

<h1>🎮 ENAM Game</h1>

<h3 id="jugadorActual"></h3>

<h2>⏳ Tiempo restante</h2>
<h3 id="timer"></h3>

<button onclick="mostrar('tablero')">Tablero</button>
<button onclick="mostrar('tareas')">Tareas</button>
<button onclick="mostrar('ranking')">Ranking</button>
<button onclick="mostrar('admin')">Admin</button>

<div id="tablero"></div>
<div id="tareas"></div>
<div id="ranking"></div>
<div id="admin"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let jugador=localStorage.getItem("jugador")

if(!jugador){
jugador=prompt("Escribe tu nombre: Renzo o Anita")
localStorage.setItem("jugador",jugador)
}

document.getElementById("jugadorActual").innerText="Jugador: "+jugador

const tareasLista=[

"Curso 1 qx: Resumen base",
"Curso 1 qx: Eva",
"Curso 1 qx: Estudia conmigo",
"Curso 2 Usa: Org mental",
"Curso 2 Usa: Resumen base",
"Curso 2 Usa: Banqueo",
"Curso 2 Usa: Casos esenciales"

]

function mostrar(p){

document.getElementById("tablero").style.display="none"
document.getElementById("tareas").style.display="none"
document.getElementById("ranking").style.display="none"
document.getElementById("admin").style.display="none"

document.getElementById(p).style.display="block"

}

function cargarTablero(){

let html="<div class='tablero'>"

for(let i=0;i<20;i++){

html+="<div class='casilla' id='c"+i+"'></div>"

}

html+="</div>"

document.getElementById("tablero").innerHTML=html

}

function cargarTareas(){

let html=""

tareasLista.forEach(t=>{

html+=`
<div class='tarea'>
${t}
<br>
<button onclick="completar('${t}')">Completar</button>
</div>
`

})

document.getElementById("tareas").innerHTML=html

}

function completar(t){

fetch(API+"?accion=tarea&jugador="+jugador+"&tarea="+t)

alert("Tarea completada!")

cargarRanking()

}

function cargarRanking(){

fetch(API+"?accion=ranking")
.then(r=>r.json())
.then(data=>{

let html="<h2>🏆 Ranking</h2>"

data.forEach(j=>{

html+=j.nombre+" : "+j.puntos+" pts<br>"

})

document.getElementById("ranking").innerHTML=html

})

}

function adminPanel(){

let html=`

<h2>ADMIN</h2>

<input id="deadline" type="datetime-local">

<br><br>

<button onclick="guardarDeadline()">Guardar Deadline</button>

<button onclick="reiniciar()">Reiniciar Juego</button>

`

document.getElementById("admin").innerHTML=html

}

function guardarDeadline(){

let d=document.getElementById("deadline").value

fetch(API+"?accion=deadline&valor="+d)

alert("Deadline actualizado")

}

function reiniciar(){

fetch(API+"?accion=reset")

alert("Nuevo juego iniciado")

}

function timer(){

fetch(API+"?accion=deadline")

.then(r=>r.text())

.then(d=>{

let deadline=new Date(d)

setInterval(()=>{

let now=new Date()

let diff=deadline-now

let h=Math.floor(diff/3600000)
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=h+"h "+m+"m "+s+"s"

},1000)

})

}

cargarTablero()
cargarTareas()
cargarRanking()
adminPanel()
timer()

</script>

</body>
</html>
