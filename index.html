<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Battle</title>

<!-- Iconos para app -->
<link rel="icon" type="image/png" sizes="512x512" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
  font-size: 22px; /* texto general grande */
  margin:0;
  padding:0;
}
.info{
  background: white;
  padding: 24px;
  border: 3px solid black;
  margin: 20px;
  font-weight: bold;
  font-size: 26px; /* info grande */
}
button{
  padding: 20px 30px;
  margin: 12px;
  font-size: 24px; /* botones gigantes */
  border: none;
  cursor: pointer;
  border-radius: 12px;
}
button:disabled{
  background: #cccccc;
  cursor: not-allowed;
}
.renzoColor{ background:#4da6ff; color:white; font-weight:bold; }
.anitaColor{ background:#ffd633; font-weight:bold; }
.bothColor{ background:#66cc66; color:white; font-weight:bold; }
.board{
  display: flex;
  flex-wrap: wrap;
  max-width: 600px;
  margin: auto;
  justify-content: center;
}
.cell{
  width: 130px;
  height: 100px;
  border: 3px solid black;
  margin: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px; /* casillas grandes */
  background: white;
  font-weight:bold;
}
.winnerBox{
  background: white;
  border: 4px solid black;
  padding: 30px;
  margin: 30px;
  font-size: 28px;
}
h1{ font-size: 42px; }
h2{ font-size: 36px; }
h3{ font-size: 32px; }
</style>
</head>

<body>
<h1>ENAM Battle</h1>

<div class="info">
<b>Semana 1</b>
<br>
Curso 1: Ginecología | Curso 2: Neurología
<br>
Deadline: 15 Marzo 2026 – 11:00 PM
<br>
<span id="timer">Cargando...</span>
</div>

<h2>Jugador</h2>
<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>
<h3 id="player"></h3>

<h2>Tareas</h2>
<button id="t0" onclick="task(0)">Curso 1 Ginecología: Resumen base</button>
<button id="t1" onclick="task(1)">Curso 1 Ginecología: Eva</button>
<button id="t2" onclick="task(2)">Curso 1 Ginecología: Estudia conmigo</button>
<button id="t3" onclick="task(3)">Curso 2 Neurología: Org mental</button>
<button id="t4" onclick="task(4)">Curso 2 Neurología: Resumen base</button>
<button id="t5" onclick="task(5)">Curso 2 Neurología: Banqueo</button>
<button id="t6" onclick="task(6)">Curso 2 Neurología: Casos esenciales</button>

<h2>Tablero</h2>
<div class="board">
<div class="cell" id="c0">Inicio</div>
<div class="cell" id="c1">1</div>
<div class="cell" id="c2">2</div>
<div class="cell" id="c3">3</div>
<div class="cell" id="c4">4</div>
<div class="cell" id="c5">5</div>
<div class="cell" id="c6">6</div>
<div class="cell" id="c7">META</div>
</div>

<h2>Puntaje</h2>
Renzo: <span id="renzo">0</span>
<br><br>
Anita: <span id="anita">0</span>

<h2 id="leader"></h2>
<div id="winner"></div>

<script>
let player=""
const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"
const DEADLINE=new Date("2026-03-15T23:00:00")

const tareas=[
"Curso 1 Ginecología: Resumen base",
"Curso 1 Ginecología: Eva",
"Curso 1 Ginecología: Estudia conmigo",
"Curso 2 Neurología: Org mental",
"Curso 2 Neurología: Resumen base",
"Curso 2 Neurología: Banqueo",
"Curso 2 Neurología: Casos esenciales"
]

const premios=[
"Cena romántica 🍝","Masaje de 30 min 💆","Película elegida 🎬","Desayuno en cama ☕","Salida sorpresa 🌅",
"Vale por 3 favores 💋","Paseo por la ciudad 🚶‍♀️🚶‍♂️","Helado juntos 🍨","Baño de burbujas 🛁","Juego de mesa juntos 🎲",
"Sesión de fotos 📸","Comprar un postre favorito 🍰","Noche de karaoke 🎤","Picnic en parque 🌳","Café juntos ☕",
"Leer un libro juntos 📚","Yoga en pareja 🧘‍♀️🧘‍♂️","Playlist personalizada 🎵","Maratón de series 📺","Escribir cartas de amor 💌",
"Puzzle juntos 🧩","Video sorpresa 🎥","Mensaje romántico sorpresa 💌","Decoración sorpresa de habitación 🎀","Salir a caminar al atardecer 🌇",
"Clase de cocina juntos 🍳","Helado nocturno 🍦","Mini spa casero 🛀","Comprar un regalo sorpresa 🎁","Sesión de dibujo juntos ✏️",
"Escribir un poema juntos ✍️","Noche de juegos de cartas 🃏","Ver fotos antiguas juntos 📷","Hacer playlist de recuerdos 🎶","Tiempo sin celular juntos ⏳",
"Postre sorpresa hecho en casa 🍮","Noche de pizza 🍕","Enviar mensaje lindo durante el día 💌","Tarde de pelis románticas 🍿","Preparar desayuno juntos 🥐",
"Paseo en bici 🚴‍♂️🚴‍♀️","Noche de velas 🕯️","Ver el amanecer juntos 🌅","Tomar helado en parque 🍦","Hacer ejercicio juntos 🏃‍♂️🏃‍♀️",
"Regalo hecho a mano 🎨","Sesión de memes divertidos 😂","Compartir un chocolate 🍫","Escribir un diario juntos 📖","Plantar una flor 🌸",
"Tomar té juntos 🍵","Jugar videojuego juntos 🎮","Foto divertida juntos 🤳"
]

function setPlayer(p){
player=p
document.getElementById("player").innerText="Jugador: "+p
loadScore()
}

function gameEnded(){ return new Date()>DEADLINE }

function task(i){
if(gameEnded()){ alert("El juego terminó"); return }
if(player==""){ alert("Selecciona jugador"); return }
fetch(API,{method:"POST", body:JSON.stringify({jugador:player,tarea:tareas[i]})})
setTimeout(loadScore,800)
}

function disableButtons(){ for(let i=0;i<tareas.length;i++){ document.getElementById("t"+i).disabled=true } }

function loadScore(){
fetch(API).then(r=>r.json()).then(data=>{
let estado={}, renzoScore=0, anitaScore=0
for(let i=1;i<data.length;i++){
let j=data[i][0], t=data[i][1]
if(!estado[t]) estado[t]={Renzo:false,Anita:false}
if(!estado[t][j]){
estado[t][j]=true
if(j=="Renzo") renzoScore++
if(j=="Anita") anitaScore++
}
}
document.getElementById("renzo").innerText=renzoScore
document.getElementById("anita").innerText=anitaScore
updateTasks(estado)
drawPieces(renzoScore,anitaScore)
checkLeader(renzoScore,anitaScore)
checkWinner(renzoScore,anitaScore)
})
}

function updateTasks(est){
for(let i=0;i<tareas.length;i++){
let btn=document.getElementById("t"+i)
btn.className=""
let e=est[tareas[i]]
if(!e) continue
if(e.Renzo && e.Anita){ btn.innerText=tareas[i]+" RA"; btn.classList.add("bothColor") }
else if(e.Renzo){ btn.innerText=tareas[i]+" R"; btn.classList.add("renzoColor") }
else if(e.Anita){ btn.innerText=tareas[i]+" A"; btn.classList.add("anitaColor") }
}
}

function drawPieces(r,a){
for(let i=0;i<=7;i++){
if(i==0) document.getElementById("c"+i).innerHTML="Inicio"
else if(i==7) document.getElementById("c"+i).innerHTML="META"
else document.getElementById("c"+i).innerHTML=i
}
document.getElementById("c"+Math.min(r,7)).innerHTML+=" R"
document.getElementById("c"+Math.min(a,7)).innerHTML+=" A"
}

function checkLeader(r,a){
if(r>a) document.getElementById("leader").innerText="🏆 Renzo va ganando"
else if(a>r) document.getElementById("leader").innerText="🏆 Anita va ganando"
else document.getElementById("leader").innerText="Empate"
}

function premiosAleatorios(){
let copia=Array.from(premios), seleccion=[]
for(let i=0;i<5;i++){
let idx=Math.floor(Math.random()*copia.length)
seleccion.push(copia[idx])
copia.splice(idx,1)
}
return seleccion.join("<br>")
}

function showPrizes(winner){
document.getElementById("winner").innerHTML=
`<div class="winnerBox">
🏆 ${winner} ganó el ENAM Battle
<h3>Premios para parejas 💑</h3>
${premiosAleatorios()}
</div>`
}

function checkWinner(r,a){
if(r>=7){ disableButtons(); showPrizes("Renzo"); return }
if(a>=7){ disableButtons(); showPrizes("Anita"); return }
if(gameEnded()){ disableButtons()
if(r>a){ showPrizes("Renzo") }
else if(a>r){ showPrizes("Anita") }
else{ document.getElementById("winner").innerHTML="<div class='winnerBox'>🤝 Empate</div>" }
}
}

function updateTimer(){
let now=new Date(), diff=DEADLINE-now
if(diff<=0){ document.getElementById("timer").innerText="⏰ Competencia terminada"; return }
let d=Math.floor(diff/1000/60/60/24)
let h=Math.floor(diff/1000/60/60)%24
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60
document.getElementById("timer").innerText="⏳ Tiempo restante: "+d+"d "+h+"h "+m+"m "+s+"s"
}

setInterval(updateTimer,1000)
setInterval(loadScore,3000)
</script>
</body>
</html>
