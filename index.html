<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Battle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
padding:10px;
margin:5px;
font-size:14px;
border:none;
cursor:pointer;
}

.renzoColor{
background:#4da6ff;
}

.anitaColor{
background:#ffd633;
}

.bothColor{
background:#66cc66;
}

.board{
display:flex;
flex-wrap:wrap;
max-width:420px;
margin:auto;
}

.cell{
width:90px;
height:70px;
border:2px solid black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
background:white;
}

#courses{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
font-weight:bold;
}

#timer{
font-size:20px;
margin:10px;
}

#winnerBox{
font-size:22px;
font-weight:bold;
margin:20px;
color:#cc6600;
}

</style>

</head>

<body>

<h1>ENAM Battle</h1>

<div id="courses">
Curso 1: Ginecología | Curso 2: Neurología
</div>

<div id="timer"></div>

<div id="winnerBox"></div>

<h2>Jugador</h2>

<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>

<h3 id="player"></h3>

<h2>Tareas</h2>

<button id="t0" onclick="task(0)">Curso 1: Resumen base</button>
<button id="t1" onclick="task(1)">Curso 1: Eva</button>
<button id="t2" onclick="task(2)">Curso 1: Estudia conmigo</button>
<button id="t3" onclick="task(3)">Curso 2: Org mental</button>
<button id="t4" onclick="task(4)">Curso 2: Resumen base</button>
<button id="t5" onclick="task(5)">Curso 2: Banqueo</button>
<button id="t6" onclick="task(6)">Curso 2: Casos esenciales</button>

<h2>Tablero</h2>

<div class="board">

<div class="cell" id="c0">0</div>
<div class="cell" id="c1">1</div>
<div class="cell" id="c2">2</div>
<div class="cell" id="c3">3</div>
<div class="cell" id="c4">4</div>
<div class="cell" id="c5">5</div>
<div class="cell" id="c6">6</div>
<div class="cell" id="c7">🏁 Meta</div>

</div>

<h2>Puntaje</h2>

Renzo: <span id="renzo">0</span>
<br><br>
Anita: <span id="anita">0</span>

<script>

let player=""

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

const tareas=[
"Curso 1: Resumen base",
"Curso 1: Eva",
"Curso 1: Estudia conmigo",
"Curso 2: Org mental",
"Curso 2: Resumen base",
"Curso 2: Banqueo",
"Curso 2: Casos esenciales"
]

const deadline=new Date("2026-03-15T23:00:00")

function setPlayer(p){

player=p
document.getElementById("player").innerText="Jugador: "+p

}

function task(i){

if(new Date()>deadline){
alert("La competencia terminó")
return
}

if(player==""){
alert("Selecciona jugador")
return
}

fetch(API,{
method:"POST",
body:JSON.stringify({
jugador:player,
tarea:tareas[i]
})
})

setTimeout(loadScore,800)

}

function loadScore(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let estado={}
let renzoScore=0
let anitaScore=0

for(let i=1;i<data.length;i++){

let j=data[i][0]
let t=data[i][1]

if(!estado[t]){
estado[t]={Renzo:false,Anita:false}
}

if(!estado[t][j]){

estado[t][j]=true

if(j=="Renzo") renzoScore++
if(j=="Anita") anitaScore++

}

}

document.getElementById("renzo").innerText=renzoScore
document.getElementById("anita").innerText=anitaScore

updateTasks(estado)

drawPieces(renzoScore,anitaScore)

checkWinner(renzoScore,anitaScore)

})

}

function updateTasks(est){

for(let i=0;i<tareas.length;i++){

let btn=document.getElementById("t"+i)
btn.className=""

let e=est[tareas[i]]

if(!e) continue

if(e.Renzo && e.Anita){

btn.innerText=tareas[i]+" RA"
btn.classList.add("bothColor")

}

else if(e.Renzo){

btn.innerText=tareas[i]+" R"
btn.classList.add("renzoColor")

}

else if(e.Anita){

btn.innerText=tareas[i]+" A"
btn.classList.add("anitaColor")

}

}

}

function drawPieces(r,a){

for(let i=0;i<=7;i++){
document.getElementById("c"+i).innerHTML=i==7?"🏁 Meta":i
}

if(r<=7) document.getElementById("c"+r).innerHTML+=" R"
if(a<=7) document.getElementById("c"+a).innerHTML+=" A"

}

function checkWinner(r,a){

if(r>=7){
document.getElementById("winnerBox").innerText="🏆 Renzo llegó a META y ganó"
}

if(a>=7){
document.getElementById("winnerBox").innerText="🏆 Anita llegó a META y ganó"
}

if(new Date()>deadline){

if(r>a){
document.getElementById("winnerBox").innerText="⏰ Tiempo terminado. Ganador: Renzo 🏆"
}

else if(a>r){
document.getElementById("winnerBox").innerText="⏰ Tiempo terminado. Ganadora: Anita 🏆"
}

else{
document.getElementById("winnerBox").innerText="⏰ Empate"
}

}

}

function updateTimer(){

const now=new Date()

const diff=deadline-now

if(diff<=0){
document.getElementById("timer").innerText="⏰ Competencia terminada"
return
}

const d=Math.floor(diff/1000/60/60/24)
const h=Math.floor(diff/1000/60/60)%24
const m=Math.floor(diff/1000/60)%60

document.getElementById("timer").innerText="Deadline: "+d+"d "+h+"h "+m+"m"

}

setInterval(updateTimer,1000)
setInterval(loadScore,3000)

</script>

</body>
</html>
