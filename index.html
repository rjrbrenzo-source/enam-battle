<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ENAM Battle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
padding:10px;
margin:5px;
width:260px;
cursor:pointer;
}

.board{
display:flex;
flex-wrap:wrap;
max-width:520px;
margin:auto;
justify-content:center;
}

.cell{
width:110px;
height:90px;
border:2px solid black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:white;
font-size:14px;
}

.admin{
margin-top:30px;
border-top:2px solid black;
padding-top:20px;
}

</style>

</head>

<body>

<h1>ENAM Battle</h1>

<h2>Jugador</h2>

<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>

<h3 id="player"></h3>

<h2>Tiempo restante</h2>
<div id="timer"></div>

<h2>Tareas</h2>

<button onclick="task('Curso 1 qx: Resumen base')">Curso 1 qx: Resumen base</button>
<button onclick="task('Curso 1 qx: Eva')">Curso 1 qx: Eva</button>
<button onclick="task('Curso 1 qx: Estudia conmigo')">Curso 1 qx: Estudia conmigo</button>

<button onclick="task('Curso 2 Usa: Org mental')">Curso 2 Usa: Org mental</button>
<button onclick="task('Curso 2 Usa: Resumen base')">Curso 2 Usa: Resumen base</button>
<button onclick="task('Curso 2 Usa: Banqueo')">Curso 2 Usa: Banqueo</button>
<button onclick="task('Curso 2 Usa: Casos esenciales')">Curso 2 Usa: Casos esenciales</button>

<h2>Tablero</h2>

<div class="board">

<div class="cell">Inicio</div>

<div class="cell">1<br><span id="r1"></span><span id="a1"></span></div>
<div class="cell">2<br><span id="r2"></span><span id="a2"></span></div>
<div class="cell">3<br><span id="r3"></span><span id="a3"></span></div>
<div class="cell">4<br><span id="r4"></span><span id="a4"></span></div>
<div class="cell">5<br><span id="r5"></span><span id="a5"></span></div>
<div class="cell">6<br><span id="r6"></span><span id="a6"></span></div>
<div class="cell">7<br><span id="r7"></span><span id="a7"></span></div>

<div class="cell">🏁</div>

</div>

<h2>Puntaje</h2>

Renzo: <span id="renzo">0</span>

<br><br>

Anita: <span id="anita">0</span>

<h2 id="winner"></h2>

<h2>Copas</h2>

Renzo 🏆 <span id="cupRenzo">0</span>

<br><br>

Anita 🏆 <span id="cupAnita">0</span>

<div class="admin">

<h2>ADMIN</h2>

<p>Deadline</p>

<input type="date" id="deadlineInput">

<br><br>

<button onclick="restartGame()">Reiniciar semana</button>

</div>

<script>

let player=""

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let deadline=localStorage.getItem("deadline") || "2026-03-15"

let cupRenzo=parseInt(localStorage.getItem("cupRenzo") || 0)
let cupAnita=parseInt(localStorage.getItem("cupAnita") || 0)

let winnerDeclared=false

document.getElementById("cupRenzo").innerText=cupRenzo
document.getElementById("cupAnita").innerText=cupAnita

function setPlayer(p){

player=p
document.getElementById("player").innerText="Jugador: "+p
loadScore()

}

function task(t){

if(player===""){

alert("Selecciona jugador")
return

}

fetch(API,{
method:"POST",
body:JSON.stringify({
jugador:player,
tarea:t
})
})

setTimeout(loadScore,1000)

}

function loadScore(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let r=0
let a=0

for(let i=1;i<data.length;i++){

if(data[i][0]==="Renzo") r++
if(data[i][0]==="Anita") a++

}

document.getElementById("renzo").innerText=r
document.getElementById("anita").innerText=a

drawBoard(r,a)
checkWinner(r,a)

})

}

function drawBoard(r,a){

for(let i=1;i<=7;i++){

document.getElementById("r"+i).innerText=""
document.getElementById("a"+i).innerText=""

}

if(r>0 && r<=7) document.getElementById("r"+r).innerText="🔵"
if(a>0 && a<=7) document.getElementById("a"+a).innerText="🔴"

}

function checkWinner(r,a){

if(winnerDeclared) return

if(r>=7){

winnerDeclared=true
document.getElementById("winner").innerText="🏆 Ganador Renzo"

cupRenzo++
localStorage.setItem("cupRenzo",cupRenzo)

document.getElementById("cupRenzo").innerText=cupRenzo

}

if(a>=7){

winnerDeclared=true
document.getElementById("winner").innerText="🏆 Ganadora Anita"

cupAnita++
localStorage.setItem("cupAnita",cupAnita)

document.getElementById("cupAnita").innerText=cupAnita

}

}

function updateTimer(){

const now=new Date()
const end=new Date(deadline+"T23:59:59")

const diff=end-now

if(diff<=0){

document.getElementById("timer").innerText="⛔ Semana terminada"
decideWinner()
return

}

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor((diff/(1000*60*60))%24)
const minutes=Math.floor((diff/(1000*60))%60)

document.getElementById("timer").innerText=
days+" días "+hours+" horas "+minutes+" min"

}

function decideWinner(){

if(winnerDeclared) return

let r=parseInt(document.getElementById("renzo").innerText)
let a=parseInt(document.getElementById("anita").innerText)

winnerDeclared=true

if(r>a){

document.getElementById("winner").innerText="🏆 Renzo gana por puntos"

cupRenzo++
localStorage.setItem("cupRenzo",cupRenzo)

}

else if(a>r){

document.getElementById("winner").innerText="🏆 Anita gana por puntos"

cupAnita++
localStorage.setItem("cupAnita",cupAnita)

}

else{

document.getElementById("winner").innerText="🤝 Empate"

}

document.getElementById("cupRenzo").innerText=cupRenzo
document.getElementById("cupAnita").innerText=cupAnita

}

function restartGame(){

const d=document.getElementById("deadlineInput").value

if(d) localStorage.setItem("deadline",d)

winnerDeclared=false

location.reload()

}

setInterval(updateTimer,1000)
setInterval(loadScore,4000)

</script>

</body>
</html>
