<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Battle</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
text-align:center;
background:#eef2ff;
}

button{
padding:10px;
margin:6px;
}

#board{
display:grid;
grid-template-columns:repeat(5,70px);
grid-gap:8px;
justify-content:center;
margin-top:20px;
}

.cell{
width:70px;
height:70px;
border-radius:12px;
background:white;
border:2px solid #444;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
transition:all 0.3s;
}

.cell.active{
background:#c7d2fe;
}

#victory{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
color:white;
font-size:28px;
align-items:center;
justify-content:center;
flex-direction:column;
}

.admin{
margin-top:40px;
border-top:2px solid #333;
padding-top:20px;
}

</style>
</head>

<body>

<h1>ENAM Battle</h1>

<h3 id="player"></h3>

<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>

<h2>⏳ Tiempo restante</h2>
<div id="timer"></div>

<h2>🎮 Tablero</h2>

<div id="board">

<div class="cell">🏁</div>
<div class="cell" id="c7"></div>
<div class="cell" id="c6"></div>
<div class="cell" id="c5"></div>
<div class="cell" id="c4"></div>
<div class="cell" id="c3"></div>
<div class="cell" id="c2"></div>
<div class="cell" id="c1"></div>
<div class="cell">Inicio</div>

</div>

<h2>📋 Tareas</h2>

<button onclick="task('Curso 1 qx: Resumen base')">Curso 1 qx: Resumen base</button>
<button onclick="task('Curso 1 qx: Eva')">Curso 1 qx: Eva</button>
<button onclick="task('Curso 1 qx: Estudia conmigo')">Curso 1 qx: Estudia conmigo</button>

<button onclick="task('Curso 2 Usa: Org mental')">Curso 2 Usa: Org mental</button>
<button onclick="task('Curso 2 Usa: Resumen base')">Curso 2 Usa: Resumen base</button>
<button onclick="task('Curso 2 Usa: Banqueo')">Curso 2 Usa: Banqueo</button>
<button onclick="task('Curso 2 Usa: Casos esenciales')">Curso 2 Usa: Casos esenciales</button>

<h2>📊 Ranking semanal</h2>

Renzo: <span id="renzo">0</span> pts  
<br><br>
Anita: <span id="anita">0</span> pts  

<h3 id="message"></h3>

<div class="admin">

<h2>👑 ADMIN</h2>

<p>Deadline</p>

<input type="date" id="deadlineInput">

<br><br>

<button onclick="setDeadline()">Guardar deadline</button>

</div>

<div id="victory">

<div id="victoryText"></div>

<button onclick="closeVictory()">Cerrar</button>

</div>

<audio id="sound">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

let player=""

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let deadline=localStorage.getItem("deadline") || "2026-03-15"

const messages=[
"💪 ¡Vamos! cada tarea es un paso al 15 en el ENAM",
"❤️ Anita y Renzo, equipo invencible",
"🔥 El esfuerzo de hoy será el orgullo de mañana",
"📚 Una tarea más cerca del sueño",
"🏆 El ganador invita la cita"
]

function setPlayer(p){

player=p

document.getElementById("player").innerText="Jugador: "+p

loadScore()

}

function task(t){

if(player==""){

alert("Selecciona jugador")

return

}

document.getElementById("sound").play()

fetch(API,{
method:"POST",
body:JSON.stringify({
jugador:player,
tarea:t
})
})

setTimeout(loadScore,1000)

}

function loadScore(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let r=0
let a=0

for(let i=1;i<data.length;i++){

if(data[i][0]=="Renzo") r++

if(data[i][0]=="Anita") a++

}

document.getElementById("renzo").innerText=r
document.getElementById("anita").innerText=a

drawBoard(r,a)

checkWinner(r,a)

randomMessage()

})

}

function drawBoard(r,a){

for(let i=1;i<=7;i++){

document.getElementById("c"+i).innerText=""

}

if(r>0) document.getElementById("c"+r).innerText+="🔵"

if(a>0) document.getElementById("c"+a).innerText+="🔴"

}

function checkWinner(r,a){

if(r>=7){

showVictory("🏆 Renzo gana la semana")

}

if(a>=7){

showVictory("🏆 Anita gana la semana")

}

}

function showVictory(text){

document.getElementById("victoryText").innerText=text

document.getElementById("victory").style.display="flex"

}

function closeVictory(){

document.getElementById("victory").style.display="none"

}

function randomMessage(){

const m=messages[Math.floor(Math.random()*messages.length)]

document.getElementById("message").innerText=m

}

function updateTimer(){

const now=new Date()

const d=new Date(deadline)

const diff=d-now

if(diff<=0){

document.getElementById("timer").innerText="⛔ Semana cerrada"

return

}

const days=Math.floor(diff/1000/60/60/24)
const hours=Math.floor(diff/1000/60/60)%24
const minutes=Math.floor(diff/1000/60)%60

document.getElementById("timer").innerText=
days+" días "+hours+" horas "+minutes+" min"

}

function setDeadline(){

const d=document.getElementById("deadlineInput").value

localStorage.setItem("deadline",d)

deadline=d

alert("Deadline guardado")

}

setInterval(updateTimer,1000)

setInterval(loadScore,3000)

</script>

</body>
</html>
