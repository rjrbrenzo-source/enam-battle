<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Battle</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
}

button{
padding:12px;
margin:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1>ENAM Battle</h1>

<button onclick="selectPlayer('Renzo')">Soy Renzo</button>
<button onclick="selectPlayer('Pareja')">Soy Pareja</button>

<h2>Tareas</h2>

<button onclick="completeTask('Curso')">Curso</button>
<button onclick="completeTask('Preguntas')">Preguntas</button>
<button onclick="completeTask('Flashcards')">Flashcards</button>

<h3 id="status"></h3>

<script>

const supabase = window.supabase.createClient(
'https://saqpncdtyiosuffjjxrj.supabase.co',
'sb_publishable_8kfDSywSHxo2jzK0cB9VUQ_J2jGVeP8'
)

let player = ""

function selectPlayer(p){
player=p
document.getElementById("status").innerText="Jugador: "+p
}

async function completeTask(task){

if(player==""){
alert("Primero elige jugador")
return
}

const {data,error}=await supabase
.from("progress")
.insert([{player:player,task:task}])

if(error){
alert("Error: "+error.message)
}else{
document.getElementById("status").innerText="Guardado: "+player+" hizo "+task
}

}

</script>

</body>
</html>
