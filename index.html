<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ENAM Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
background:#38bdf8;
color:white;
font-size:15px;
}

.tarea{
background:#1e293b;
margin:8px;
padding:10px;
border-radius:10px;
}

.bloqueada{
opacity:0.4;
}

table{
margin:auto;
border-collapse:collapse;
margin-top:10px;
}

td,th{
border:1px solid white;
padding:8px;
}

</style>

</head>

<body>

<h1>🎮 ENAM GAME</h1>

<h3>Curso 1: Ginecología</h3>
<h3>Curso 2: Neurología</h3>

<h3>Seleccionar jugador</h3>

<button onclick="setJugador('Renzo')">Jugador Renzo</button>
<button onclick="setJugador('Anita')">Jugador Anita</button>

<h2 id="jugador"></h2>

<h2>⏳ Tiempo restante</h2>
<h2 id="timer"></h2>

<button onclick="verPuntaje()">📊 Puntaje</button>
<button onclick="verTareas()">📚 Tareas</button>
<button onclick="configurarDeadline()">⏱ Deadline</button>

<div id="contenido"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let jugador=""

const tareas=[

"Curso 1 qx: Resumen base",
"Curso 1 qx: Eva",
"Curso 1 qx: Estudia conmigo",
"Curso 2 Usa: Org mental",
"Curso 2 Usa: Resumen base",
"Curso 2 Usa: Banqueo",
"Curso 2 Usa: Casos esenciales"

]

function setJugador(n){

jugador=n

document.getElementById("jugador").innerText="Jugador: "+jugador

}

function verPuntaje(){

fetch(API+"?accion=ranking")

.then(r=>r.json())

.then(data=>{

let renzo=0
let anita=0

data.forEach(j=>{

if(j.nombre=="Renzo") renzo=j.puntos
if(j.nombre=="Anita") anita=j.puntos

})

let html=`

<h2>📊 Tabla de Puntaje</h2>

<table>

<tr>
<th>Jugador</th>
<th>Puntos</th>
<th>Meta</th>
</tr>

<tr>
<td>Renzo</td>
<td>${renzo}</td>
<td>7</td>
</tr>

<tr>
<td>Anita</td>
<td>${anita}</td>
<td>7</td>
</tr>

</table>

`

document.getElementById("contenido").innerHTML=html

if(renzo>=7){

ganador("Renzo")

}

if(anita>=7){

ganador("Anita")

}

})

}

function verTareas(){

fetch(API+"?accion=estado")

.then(r=>r.json())

.then(data=>{

let html=""

tareas.forEach(t=>{

let r=data.Renzo?.includes(t)
let a=data.Anita?.includes(t)

html+=`

<div class="tarea ${r&&jugador=='Renzo'||a&&jugador=='Anita'?'bloqueada':''}">

${t}

<br>

Renzo: ${r?"✅":"⬜"}
Anita: ${a?"✅":"⬜"}

<br>

<button onclick="completar('${t}')" 
${r&&jugador=='Renzo'||a&&jugador=='Anita'?'disabled':''}>

Completar

</button>

</div>

`

})

document.getElementById("contenido").innerHTML=html

})

}

function completar(t){

if(!jugador){

alert("Selecciona jugador")

return

}

fetch(API+"?accion=tarea&jugador="+jugador+"&tarea="+t)

alert("Tarea completada")

verTareas()

verPuntaje()

}

function configurarDeadline(){

let html=`

<h2>Configurar Deadline</h2>

<input id="deadline" type="datetime-local">

<br><br>

<button onclick="guardarDeadline()">

Guardar

</button>

`

document.getElementById("contenido").innerHTML=html

}

function guardarDeadline(){

let d=document.getElementById("deadline").value

fetch(API+"?accion=deadline&valor="+d)

alert("Deadline actualizado")

}

function iniciarTimer(){

fetch(API+"?accion=deadline")

.then(r=>r.text())

.then(d=>{

let deadline=new Date(d)

setInterval(()=>{

let now=new Date()

let diff=deadline-now

if(diff<0){

document.getElementById("timer").innerText="FIN"

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

h+"h "+m+"m "+s+"s"

},1000)

})

}

function ganador(n){

document.getElementById("contenido").innerHTML=

`

<h1>🏆 ${n} GANÓ</h1>

<h2>Premio de pareja ❤️</h2>

<p>

💋 10 besos

🍝 Cena romántica

💆 Masaje relajante

🎬 Elegir película

</p>

`

}

iniciarTimer()

</script>

</body>
</html>
