<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ENAM Battle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
padding:10px;
margin:5px;
font-size:14px;
}

.board{
display:flex;
flex-wrap:wrap;
max-width:420px;
margin:auto;
}

.cell{
width:90px;
height:70px;
border:2px solid black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
background:white;
position:relative;
}

.renzo{
color:blue;
font-weight:bold;
}

.anita{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h1>ENAM Battle</h1>

<h2>Jugador</h2>

<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>

<h3 id="player"></h3>

<h2>Tiempo restante</h2>
<div id="timer"></div>

<h2>Tareas</h2>

<button onclick="task(1,'Curso 1 qx: Resumen base')">Resumen base</button>
<button onclick="task(2,'Curso 1 qx: Eva')">Eva</button>
<button onclick="task(3,'Curso 1 qx: Estudia conmigo')">Estudia conmigo</button>

<button onclick="task(4,'Curso 2 Usa: Org mental')">Org mental</button>
<button onclick="task(5,'Curso 2 Usa: Resumen base')">Resumen base</button>
<button onclick="task(6,'Curso 2 Usa: Banqueo')">Banqueo</button>
<button onclick="task(7,'Curso 2 Usa: Casos esenciales')">Casos esenciales</button>

<h2>Tablero</h2>

<div class="board">

<div class="cell" id="c0">Inicio</div>
<div class="cell" id="c1">1</div>
<div class="cell" id="c2">2</div>
<div class="cell" id="c3">3</div>
<div class="cell" id="c4">4</div>
<div class="cell" id="c5">5</div>
<div class="cell" id="c6">6</div>
<div class="cell" id="c7">7</div>
<div class="cell" id="c8">🏁</div>

</div>

<h2>Puntaje</h2>

Renzo: <span id="renzo">0</span>

<br><br>

Anita: <span id="anita">0</span>

<h2 id="leader"></h2>

<script>

let player=""

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let tasksDone={}

function setPlayer(p){

player=p
document.getElementById("player").innerText="Jugador: "+p

loadScore()

}

function task(id,t){

if(player==""){
alert("Selecciona jugador")
return
}

if(tasksDone[id]){
alert("Esta tarea ya fue hecha")
return
}

tasksDone[id]=true

fetch(API,{
method:"POST",
body:JSON.stringify({
jugador:player,
tarea:t
})
})

loadScore()

}

function loadScore(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let r=0
let a=0

for(let i=1;i<data.length;i++){

if(data[i][0]=="Renzo") r++
if(data[i][0]=="Anita") a++

}

document.getElementById("renzo").innerText=r
document.getElementById("anita").innerText=a

drawPieces(r,a)

if(r>a){
document.getElementById("leader").innerText="🏆 Renzo va ganando"
}
else if(a>r){
document.getElementById("leader").innerText="🏆 Anita va ganando"
}
else{
document.getElementById("leader").innerText="Empate"
}

})

}

function drawPieces(r,a){

for(let i=0;i<=8;i++){
document.getElementById("c"+i).innerHTML=i==0?"Inicio":i
}

document.getElementById("c"+r).innerHTML+="<div class='renzo'>R</div>"
document.getElementById("c"+a).innerHTML+="<div class='anita'>A</div>"

}

setInterval(loadScore,3000)

const deadline=new Date("2026-03-15")

function updateTimer(){

const now=new Date()
const diff=deadline-now

const d=Math.floor(diff/1000/60/60/24)
const h=Math.floor(diff/1000/60/60)%24
const m=Math.floor(diff/1000/60)%60

document.getElementById("timer").innerText=
d+" días "+h+" horas "+m+" min"

}

setInterval(updateTimer,1000)

</script>

</body>
</html>
