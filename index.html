<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>ENAM Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button{
padding:10px;
margin:6px;
border-radius:10px;
border:none;
background:#38bdf8;
color:white;
font-size:16px;
}

.tablero{
display:grid;
grid-template-columns:repeat(4,70px);
gap:8px;
justify-content:center;
margin-top:20px;
}

.casilla{
width:70px;
height:70px;
background:#1e293b;
border-radius:12px;
position:relative;
}

.meta{
background:#22c55e;
}

.renzo{
width:22px;
height:22px;
background:#22c55e;
border-radius:50%;
position:absolute;
top:22px;
left:8px;
transition:all 0.4s;
}

.anita{
width:22px;
height:22px;
background:#f43f5e;
border-radius:50%;
position:absolute;
top:22px;
right:8px;
transition:all 0.4s;
}

.tarea{
background:#1e293b;
margin:8px;
padding:10px;
border-radius:10px;
}

.barra{
width:200px;
height:20px;
background:#1e293b;
border-radius:10px;
margin:auto;
}

.progreso{
height:20px;
background:#22c55e;
border-radius:10px;
}

</style>

</head>

<body>

<h1>🎮 ENAM GAME</h1>

<h3>Selecciona jugador</h3>

<button onclick="setJugador('Renzo')">Jugador Renzo</button>
<button onclick="setJugador('Anita')">Jugador Anita</button>

<h2 id="jugador"></h2>

<h2>⏳ Tiempo restante</h2>
<h2 id="timer"></h2>

<button onclick="verTablero()">🎮 Tablero</button>
<button onclick="verTareas()">📚 Tareas</button>
<button onclick="verAdmin()">⚙️ Admin</button>

<div id="contenido"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let jugador=""

let copas=JSON.parse(localStorage.getItem("copas")) || {Renzo:0,Anita:0}

const tareas=[

"Curso 1 qx: Resumen base",
"Curso 1 qx: Eva",
"Curso 1 qx: Estudia conmigo",
"Curso 2 Usa: Org mental",
"Curso 2 Usa: Resumen base",
"Curso 2 Usa: Banqueo",
"Curso 2 Usa: Casos esenciales"

]

function setJugador(n){

jugador=n

document.getElementById("jugador").innerText="Jugador: "+jugador

}

function verTablero(){

fetch(API+"?accion=ranking")

.then(r=>r.json())

.then(data=>{

let renzo=0
let anita=0

data.forEach(j=>{

if(j.nombre=="Renzo") renzo=j.puntos
if(j.nombre=="Anita") anita=j.puntos

})

let html=`

<h3>🏆 Copas</h3>

Renzo 🏆 ${copas.Renzo} |
Anita 🏆 ${copas.Anita}

<br><br>

Renzo

<div class="barra">
<div class="progreso" style="width:${renzo*14}%"></div>
</div>

<br>

Anita

<div class="barra">
<div class="progreso" style="width:${anita*14}%"></div>
</div>

`

html+="<div class='tablero'>"

for(let i=0;i<7;i++){

let clase="casilla"

if(i==6) clase="casilla meta"

html+=`<div class="${clase}">`

if(i==renzo) html+=`<div class="renzo"></div>`
if(i==anita) html+=`<div class="anita"></div>`

html+="</div>"

}

html+="</div>"

document.getElementById("contenido").innerHTML=html

if(renzo>=7) ganador("Renzo")

if(anita>=7) ganador("Anita")

})

}

function verTareas(){

fetch(API+"?accion=estado")

.then(r=>r.json())

.then(data=>{

let html=""

tareas.forEach(t=>{

let r=data.Renzo?.includes(t)
let a=data.Anita?.includes(t)

html+=`

<div class="tarea">

${t}

<br>

Renzo: ${r?"✅":"⬜"}

Anita: ${a?"✅":"⬜"}

<br>

<button onclick="completar('${t}')">

Completar

</button>

</div>

`

})

document.getElementById("contenido").innerHTML=html

})

}

function completar(t){

if(!jugador){

alert("Selecciona jugador")

return

}

fetch(API+"?accion=tarea&jugador="+jugador+"&tarea="+t)

alert("Tarea marcada")

verTareas()

}

function verAdmin(){

let html=`

<h2>Administrador</h2>

<input id="deadline" type="datetime-local">

<br><br>

<button onclick="guardarDeadline()">

Guardar Deadline

</button>

<br><br>

<button onclick="reset()">

Reiniciar Juego

</button>

`

document.getElementById("contenido").innerHTML=html

}

function guardarDeadline(){

let d=document.getElementById("deadline").value

fetch(API+"?accion=deadline&valor="+d)

alert("Deadline actualizado")

}

function reset(){

fetch(API+"?accion=reset")

alert("Juego reiniciado")

}

function iniciarTimer(){

fetch(API+"?accion=deadline")

.then(r=>r.text())

.then(d=>{

let deadline=new Date(d)

setInterval(()=>{

let now=new Date()

let diff=deadline-now

if(diff<0){

document.getElementById("timer").innerText="FIN"

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

h+"h "+m+"m "+s+"s"

},1000)

})

}

function ganador(n){

copas[n]++

localStorage.setItem("copas",JSON.stringify(copas))

document.getElementById("contenido").innerHTML=

`

<h1>🏆 ${n} GANÓ</h1>

<h2>Premio romántico ❤️</h2>

<p>

💋 10 besos

🍝 Cena preparada

💆 Masaje relajante

🎬 Elegir película

</p>

`

}

iniciarTimer()

</script>

</body>
</html>
