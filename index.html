<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ENAM Battle</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

h1{
font-size:40px;
}

h2{
margin-top:25px;
}

button{
padding:12px;
margin:6px;
width:270px;
cursor:pointer;
font-size:14px;
}

.completed{
background:#4CAF50;
color:white;
}

.board{
display:flex;
flex-wrap:wrap;
max-width:520px;
margin:auto;
justify-content:center;
}

.cell{
width:110px;
height:90px;
border:2px solid black;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:white;
font-size:14px;
}

</style>

</head>

<body>

<h1>ENAM Battle</h1>

<h2 style="font-size:28px;color:#333;">
Curso 1: Ginecología | Curso 2: Neurología
</h2>

<h2>Jugador</h2>

<button onclick="setPlayer('Renzo')">Soy Renzo</button>
<button onclick="setPlayer('Anita')">Soy Anita</button>

<h3 id="player"></h3>

<h2>Tiempo restante</h2>
<div id="timer"></div>

<h2>Tareas</h2>

<button onclick="task(this,'Curso1-1')">Curso 1: Resumen base</button>
<button onclick="task(this,'Curso1-2')">Curso 1: EVA</button>
<button onclick="task(this,'Curso1-3')">Curso 1: Estudia conmigo</button>

<button onclick="task(this,'Curso2-1')">Curso 2: Org mental</button>
<button onclick="task(this,'Curso2-2')">Curso 2: Resumen base</button>
<button onclick="task(this,'Curso2-3')">Curso 2: Banqueo</button>
<button onclick="task(this,'Curso2-4')">Curso 2: Casos esenciales</button>

<h2>Tablero</h2>

<div class="board">

<div class="cell">Inicio</div>

<div class="cell">1<br><span id="r1"></span><span id="a1"></span></div>
<div class="cell">2<br><span id="r2"></span><span id="a2"></span></div>
<div class="cell">3<br><span id="r3"></span><span id="a3"></span></div>
<div class="cell">4<br><span id="r4"></span><span id="a4"></span></div>
<div class="cell">5<br><span id="r5"></span><span id="a5"></span></div>
<div class="cell">6<br><span id="r6"></span><span id="a6"></span></div>
<div class="cell">7<br><span id="r7"></span><span id="a7"></span></div>

<div class="cell">🏁</div>

</div>

<h2>Puntaje</h2>

Renzo: <span id="renzo">0</span>

<br><br>

Anita: <span id="anita">0</span>

<h2 id="winner"></h2>

<h2>Copas</h2>

Renzo 🏆 <span id="cupRenzo">0</span>

<br><br>

Anita 🏆 <span id="cupAnita">0</span>

<br><br>

<h3>Deadline</h3>

<input type="date" id="deadlineInput">

<br><br>

<button onclick="restartGame()">Reiniciar todo</button>

<script>

let player=""

let deadline=localStorage.getItem("deadline") || "2026-03-15"

let rScore=0
let aScore=0

let cupRenzo=0
let cupAnita=0

let winnerDeclared=false

function setPlayer(p){

player=p

document.getElementById("player").innerText="Jugador: "+p

}

function task(btn,id){

if(player===""){

alert("Selecciona jugador")
return

}

if(btn.classList.contains("completed")) return

btn.classList.add("completed")
btn.innerHTML="✔ "+btn.innerText
btn.disabled=true

if(player==="Renzo") rScore++
if(player==="Anita") aScore++

updateScore()

}

function updateScore(){

document.getElementById("renzo").innerText=rScore
document.getElementById("anita").innerText=aScore

drawBoard()

checkWinner()

}

function drawBoard(){

for(let i=1;i<=7;i++){

document.getElementById("r"+i).innerText=""
document.getElementById("a"+i).innerText=""

}

if(rScore>0 && rScore<=7) document.getElementById("r"+rScore).innerText="🔵"
if(aScore>0 && aScore<=7) document.getElementById("a"+aScore).innerText="🔴"

}

function checkWinner(){

if(winnerDeclared) return

if(rScore>=7){

winnerDeclared=true
cupRenzo=1

document.getElementById("winner").innerText="🏆 Renzo gana la semana"

document.getElementById("cupRenzo").innerText=cupRenzo

}

if(aScore>=7){

winnerDeclared=true
cupAnita=1

document.getElementById("winner").innerText="🏆 Anita gana la semana"

document.getElementById("cupAnita").innerText=cupAnita

}

}

function updateTimer(){

const now=new Date()
const end=new Date(deadline+"T23:59:59")

const diff=end-now

if(diff<=0){

document.getElementById("timer").innerText="⛔ Deadline terminado"
return

}

const days=Math.floor(diff/(1000*60*60*24))
const hours=Math.floor((diff/(1000*60*60))%24)
const minutes=Math.floor((diff/(1000*60))%60)

document.getElementById("timer").innerText=
days+" días "+hours+" horas "+minutes+" min"

}

function restartGame(){

rScore=0
aScore=0

cupRenzo=0
cupAnita=0

winnerDeclared=false

const d=document.getElementById("deadlineInput").value

if(d) deadline=d

localStorage.setItem("deadline",deadline)

location.reload()

}

setInterval(updateTimer,1000)

</script>

</body>
</html>
