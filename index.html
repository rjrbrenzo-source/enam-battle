<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ENAM Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
background:#38bdf8;
color:white;
font-size:15px;
}

.tarea{
background:#1e293b;
margin:8px;
padding:10px;
border-radius:10px;
}

.bloqueada{
opacity:0.4;
}

.puntaje{
font-size:20px;
margin:10px;
}

</style>

</head>

<body>

<h1>🎮 ENAM GAME</h1>

<h3>Curso 1: Ginecología</h3>
<h3>Curso 2: Neurología</h3>

<h3>Selecciona jugador</h3>

<button onclick="setJugador('Renzo')">Jugador Renzo</button>
<button onclick="setJugador('Anita')">Jugador Anita</button>

<h2 id="jugador"></h2>

<h2>⏳ Tiempo restante</h2>
<h2 id="timer"></h2>

<button onclick="verCompetencia()">🏁 Competencia</button>
<button onclick="verTareas()">📚 Tareas</button>
<button onclick="configurarDeadline()">⏱ Deadline</button>

<div id="contenido"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwYSN53Pnxw_YMJ7f99-JBbz-XUdLg6OZjrIn8rrI0jMKNMQslk0hyqMGUYFjBe0qxTWg/exec"

let jugador=""

const tareas=[

"Curso 1 qx: Resumen base",
"Curso 1 qx: Eva",
"Curso 1 qx: Estudia conmigo",
"Curso 2 Usa: Org mental",
"Curso 2 Usa: Resumen base",
"Curso 2 Usa: Banqueo",
"Curso 2 Usa: Casos esenciales"

]

function setJugador(n){

jugador=n

document.getElementById("jugador").innerText="Jugador: "+jugador

}

function verCompetencia(){

fetch(API+"?accion=ranking")

.then(r=>r.json())

.then(data=>{

let renzo=0
let anita=0

data.forEach(j=>{

if(j.nombre=="Renzo") renzo=j.puntos
if(j.nombre=="Anita") anita=j.puntos

})

let html=`

<h2>🏁 Competencia</h2>

<div class="puntaje">

Renzo: ${renzo} / 7 puntos

</div>

<div class="puntaje">

Anita: ${anita} / 7 puntos

</div>

`

document.getElementById("contenido").innerHTML=html

if(renzo>=7){

ganador("Renzo")

}

if(anita>=7){

ganador("Anita")

}

})

}

function verTareas(){

fetch(API+"?accion=estado")

.then(r=>r.json())

.then(data=>{

let html=""

tareas.forEach(t=>{

let r=data.Renzo?.includes(t)
let a=data.Anita?.includes(t)

let bloqueada = (jugador=="Renzo" && r) || (jugador=="Anita" && a)

html+=`

<div class="tarea ${bloqueada?'bloqueada':''}">

${t}

<br>

Renzo: ${r?"✅":"⬜"}
Anita: ${a?"✅":"⬜"}

<br>

<button onclick="completar('${t}')" ${bloqueada?'disabled':''}>

Completar

</button>

</div>

`

})

document.getElementById("contenido").innerHTML=html

})

}

function completar(t){

if(!jugador){

alert("Selecciona jugador")

return

}

fetch(API+"?accion=tarea&jugador="+jugador+"&tarea="+t)

alert("Tarea completada")

verTareas()
verCompetencia()

}

function configurarDeadline(){

let html=`

<h2>Configurar Deadline</h2>

<input id="deadline" type="datetime-local">

<br><br>

<button onclick="guardarDeadline()">Guardar</button>

`

document.getElementById("contenido").innerHTML=html

}

function guardarDeadline(){

let d=document.getElementById("deadline").value

fetch(API+"?accion=deadline&valor="+d)

alert("Deadline actualizado")

}

function iniciarTimer(){

fetch(API+"?accion=deadline")

.then(r=>r.text())

.then(d=>{

if(!d){

document.getElementById("timer").innerText="Configurar deadline"

return

}

let deadline=new Date(d)

setInterval(()=>{

let now=new Date()

let diff=deadline-now

if(diff<=0){

terminarJuego()

return

}

let h=Math.floor(diff/3600000)
let m=Math.floor(diff/60000)%60
let s=Math.floor(diff/1000)%60

document.getElementById("timer").innerText=

h+"h "+m+"m "+s+"s"

},1000)

})

}

function terminarJuego(){

fetch(API+"?accion=ranking")

.then(r=>r.json())

.then(data=>{

let renzo=0
let anita=0

data.forEach(j=>{

if(j.nombre=="Renzo") renzo=j.puntos
if(j.nombre=="Anita") anita=j.puntos

})

if(renzo>anita){

ganador("Renzo")

}else if(anita>renzo){

ganador("Anita")

}else{

empate()

}

})

}

function ganador(n){

document.getElementById("contenido").innerHTML=

`

<h1>🏆 GANADOR: ${n}</h1>

<h2>Premio de pareja ❤️</h2>

<p>

💋 10 besos

🍝 cena romántica

💆 masaje relajante

🎬 elegir película juntos

</p>

`

}

function empate(){

document.getElementById("contenido").innerHTML=

`

<h1>🤝 Empate</h1>

<p>

Ambos deben celebrar con una salida juntos ❤️

</p>

`

}

iniciarTimer()

</script>

</body>

</html>
